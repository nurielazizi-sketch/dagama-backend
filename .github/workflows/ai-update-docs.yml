name: ai-update-docs

# Daily AI-assisted update of the prose / intent docs (the ones codegen can't
# touch). Runs at 00:30 UTC = 02:30 IL summer / 03:30 IL winter — 30 min after
# the structural regen-docs cron, so the auto-generated tables are already
# fresh when Claude reviews the diff.
#
# What it does:
#   1. Reads yesterday's commits + diff (src/, migrations/, wrangler.toml).
#   2. Sends them + the current intent docs to Claude.
#   3. Applies the find/replace edits Claude returns.
#   4. Opens a PR for human review — never auto-merges to main.
#
# Required secrets:
#   - ANTHROPIC_API_KEY  (https://console.anthropic.com/keys)
#
# Manual trigger: Actions tab → ai-update-docs → Run workflow

on:
  schedule:
    - cron: '30 0 * * *'   # 00:30 UTC daily
  workflow_dispatch:
    inputs:
      since:
        description: 'How far back to scan for diffs (e.g. "1 day ago", "1 week ago")'
        required: false
        default: '1 day ago'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ai-update-docs
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the --since= range works
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run AI doc updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          node scripts/ai-update-docs.mjs --since="${{ github.event.inputs.since || '1 day ago' }}"

      - name: Open PR if docs changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain docs/)" ]]; then
            echo "No doc changes — skipping PR."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="docs/ai-update-$DATE"
          git config user.name  "dagama-docbot"
          git config user.email "noreply@heydagama.com"
          git switch -c "$BRANCH"
          git add docs/
          git commit -m "docs: AI-suggested intent updates for $DATE

          Generated by scripts/ai-update-docs.mjs over the last 24h of source changes.
          Review the diff carefully — Claude can hallucinate. Merge when satisfied."
          git push -u origin "$BRANCH"
          gh pr create \
            --title "docs: AI-suggested intent updates for $DATE" \
            --body "Auto-generated by .github/workflows/ai-update-docs.yml. Reviews welcome — Claude can hallucinate, so verify each edit reflects an actual source change before merging." \
            --base main \
            --head "$BRANCH"
