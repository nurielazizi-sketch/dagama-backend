name = "dagama-backend"
main = "src/index.ts"
compatibility_date = "2024-04-15"
compatibility_flags = ["nodejs_compat"]
account_id = "c5147f5e370c8de027f86fcd4f5789c1"

# D1 binding available in all environments (including local dev)
[[d1_databases]]
binding = "DB"
database_name = "dagama"
database_id = "14f95bab-49ed-4821-868c-fa7afa8d2335"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "dagama-cards"

[[queues.consumers]]
queue = "dagama-card-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "dagama-card-dlq"

[[queues.producers]]
queue = "dagama-card-queue"
binding = "CARD_QUEUE"

[triggers]
crons = ["0 * * * *"]

[vars]
ENVIRONMENT = "development"
ORIGIN = "http://localhost:8788"

# ==========================================
# PRODUCTION ENVIRONMENT
# ==========================================
[env.production]
name = "dagama-backend-prod"
routes = [
  { pattern = "api.heydagama.com/*", zone_id = "54cb75cb8e08b43408c8fed31e8d1c21" },
  { pattern = "heydagama.com/*", zone_id = "54cb75cb8e08b43408c8fed31e8d1c21" }
]

[env.production.triggers]
crons = ["0 * * * *"]

[env.production.vars]
ENVIRONMENT = "production"
ORIGIN = "https://heydagama.com"
SHARED_DRIVE_ID = "0AKPcQEYiY_9IUk9PVA"
TELEGRAM_BOT_USERNAME_DEMO = "DaGaMaDemoBot"

[[env.production.d1_databases]]
binding = "DB"
database_name = "dagama"
database_id = "14f95bab-49ed-4821-868c-fa7afa8d2335"

[[env.production.r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "dagama-cards"

[[env.production.queues.consumers]]
queue = "dagama-card-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3
dead_letter_queue = "dagama-card-dlq"

[[env.production.queues.producers]]
queue = "dagama-card-queue"
binding = "CARD_QUEUE"

# Production secrets (set via CLI: wrangler secret put NAME --env production)
# - TELEGRAM_BOT_TOKEN                    (BoothBot)
# - TELEGRAM_BOT_TOKEN_SOURCE             (SourceBot)
# - TELEGRAM_BOT_TOKEN_DEMO               (DemoBot @DaGamaShow — freelancer-facing)
# - GEMINI_API_KEY
# - GCV_API_KEY                          (Google Cloud Vision API key for DOCUMENT_TEXT_DETECTION OCR)
# - WEBHOOK_SECRET
# - STRIPE_SECRET_KEY          (from Stripe dashboard → API keys)
# - STRIPE_WEBHOOK_SECRET      (from Stripe dashboard → Webhooks → signing secret)
# - STRIPE_PRICE_SINGLE_SHOW              (Stripe price ID for $49 one-time)
# - STRIPE_PRICE_3_SHOW_PACK              (Stripe price ID for $129 one-time)
# - STRIPE_PRICE_TEAM_PLAN                (Stripe price ID for $79/month recurring)
# - STRIPE_PRICE_ORGANIZER_PLAN           (Stripe price ID for $299/month — DemoBot referral tier)
# - GOOGLE_SERVICE_ACCOUNT_EMAIL          (service account email from GCP)
# - GOOGLE_SERVICE_ACCOUNT_PRIVATE_KEY    (private key PEM from service account JSON, \n-escaped)
# - GMAIL_CLIENT_ID                       (GCP OAuth 2.0 Client → Web Application)
# - GMAIL_CLIENT_SECRET                   (GCP OAuth 2.0 Client)
# - GOOGLE_SERVICE_ACCOUNT_TOKEN          (pre-refreshed OAuth2 Bearer token for Drive/Sheets)
# - DAGAMA_NOREPLY_REFRESH_TOKEN          (Gmail OAuth refresh token for transactional sender)
# - DAGAMA_NOREPLY_FROM_EMAIL             (e.g. noreply@heydagama.com)
# - DEMOBOT_ADMIN_TOKEN                   (Bearer token for /api/demobot/admin/* + shows_catalog endpoints)
# - ADMIN_EMAILS                          (comma-separated emails allowed to load /admin + call /api/admin/*)
# ── Cloudflare Access (Zero Trust) — belt-and-braces edge MFA gate ────────────
# Set both together. When set, /api/admin/* additionally requires a valid
# Cf-Access-Jwt-Assertion header (CF Access at the edge adds it automatically).
# - CF_ACCESS_TEAM_DOMAIN                 (e.g. dagama.cloudflareaccess.com)
# - CF_ACCESS_AUD_TAG                     (Application AUD tag from Zero Trust dashboard)
# ── Cloudflare Turnstile (bot mitigation on /register) ────────────────────────
# Both must be set together. When unset, /api/auth/register accepts requests
# without a captcha token (dev fallback). Site key is public; secret is private.
# - TURNSTILE_SITE_KEY                    (public, embedded in /register HTML)
# - TURNSTILE_SECRET_KEY                  (private, server siteverify)
# ── WhatsApp Cloud API (Meta) ──────────────────────────────────────────────────
# All five required to activate the channel. When unset, the webhook returns 503
# and outbound sends are no-ops (see src/whatsapp.ts isWhatsAppEnabled).
# - WHATSAPP_VERIFY_TOKEN                 (arbitrary string we pick — echoed during webhook subscribe)
# - WHATSAPP_APP_SECRET                   (Meta App Secret — verifies X-Hub-Signature-256)
# - WHATSAPP_ACCESS_TOKEN                 (System User long-lived token for graph.facebook.com)
# - WHATSAPP_PHONE_NUMBER_ID              (Graph API path segment for outbound /messages)
# - WHATSAPP_BUSINESS_ACCOUNT_ID          (WABA ID — template management + status callbacks)
