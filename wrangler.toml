name = "dagama-backend"
main = "src/index.ts"
compatibility_date = "2024-04-15"
type = "service"

# ==========================================
# DEVELOPMENT ENVIRONMENT
# ==========================================
[env.development]
name = "dagama-backend-dev"
route = "http://localhost:8787/*"
vars = { ENVIRONMENT = "development", ORIGIN = "http://localhost:8787" }

[[env.development.d1_databases]]
binding = "DB"
database_name = "dagama"
database_id = "14f95bab-49ed-4821-868c-fa7afa8d2335"

# ==========================================
# PRODUCTION ENVIRONMENT
# ==========================================
[env.production]
name = "dagama-backend-prod"
routes = [
  { pattern = "api.heydagama.com/*", zone_id = "e72d0f50297322c0c374ee0004121555" },
  { pattern = "heydagama.com/api/*", zone_id = "e72d0f50297322c0c374ee0004121555" }
]
vars = { ENVIRONMENT = "production", ORIGIN = "https://heydagama.com" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "dagama"
database_id = "14f95bab-49ed-4821-868c-fa7afa8d2335"

# Production secrets (set via CLI: wrangler secret put NAME --env production)
# - TELEGRAM_BOT_TOKEN
# - GEMINI_API_KEY
# - GOOGLE_CLIENT_ID
# - GOOGLE_CLIENT_SECRET
# - STRIPE_SECRET_KEY
# - WEBHOOK_SECRET

# ==========================================
# BUILD CONFIGURATION
# ==========================================
[build]
command = "npm run build"
cwd = "."
main = "src/index.ts"

[build.upload]
format = "modules"
main = "src/index.ts"

# ==========================================
# LIMITS
# ==========================================
[limits]
cpu_ms = 50000